name: Feature request
description: Suggest an idea or improvement for PocketShell
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please check [existing issues](https://github.com/involvex/pocketshell/issues) and [discussions](https://github.com/involvex/pocketshell/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
      placeholder: When using PocketShell on Android to manage Windows SSH hosts, I need…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SSH client / terminal
        - SSH server
        - OpenCode agents
        - SFTP / file browser
        - Settings / profiles / keys
        - Android widgets
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
        - label: I am willing to help test or implement this feature
          required: false
